# Dependabot — keeps deps, Actions, and base images patched.
# Spec §8 gate 2 (SCA): automated dependency updates feed the SCA gate and the
# 800-171 3.11.2 (flaw remediation) evidence trail. github-actions updates keep
# the SHA-pins current (gate 8); docker keeps the base image patched (gate 4).
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk patch/minor bumps to keep PR noise down; majors stay
      # individual so breaking changes are reviewed in isolation.
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies", "security"]
    ignore:
      # Keep @types/node on the major that matches the Node Active-LTS runtime
      # (currently 24 — see Dockerfile / setup-node). Dependabot otherwise bumps
      # to the newest major (26 = "Current" line, Active LTS ~Oct 2026). Node
      # major upgrades are done deliberately as their own PR, not auto-proposed.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "ci", "security"]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "docker", "security"]
    ignore:
      # Hold the Node base image at the Active-LTS major (currently 24).
      # Dependabot bumps to the newest tag, which tracks the non-LTS "Current"
      # line (26 until ~Oct 2026). Major base-image moves are done deliberately
      # (their own PR); patch/minor of the pinned major still auto-update.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
