name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: [self-hosted, jongodb]
    timeout-minutes: 15
    services:
      # The `Test (DB integration)` step runs a handful of Prisma specs against a
      # real database. pgvector image (the schema has a vector column) — mirrors
      # the e2e job's service.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        # Hold the job until Postgres is accepting connections.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # tsc --noEmit OOMs at the runner's ~2GB Node default on this codebase;
      # give it (and next build) a 4GB heap. Well within the 7GB runner.
      NODE_OPTIONS: --max-old-space-size=4096
      # Consumed by the DB-integration specs (and harmless to the unit run, which
      # mocks Prisma). Same value the Build step already used as a stub.
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci
      DIRECT_URL: postgres://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test (unit)
        # Parallel, no DB. Excludes the DB-integration specs run separately below
        # (they need Postgres + the seeded fixtures and must run serially).
        run: >-
          npm test --
          --exclude src/lib/files/__tests__/convert.test.ts
          --exclude src/lib/files/__tests__/ingest.test.ts
          --exclude src/lib/files/__tests__/propose.test.ts
          --exclude src/lib/ingest/__tests__/items.test.ts

      - name: Prepare integration test DB
        # compose/init/01-app-role.sh creates the cosmos/cosmos_app roles for the
        # compose stack; a services: Postgres doesn't run init scripts, so create
        # them here — the 20260606050000_audit_immutability migration GRANTs
        # against them. Then apply the schema + seed test-org/alice/bob fixtures.
        run: |
          npx prisma db execute --file prisma/sql/ci-roles.sql
          npx prisma migrate deploy
          npx tsx prisma/seed/test-fixtures.ts

      - name: Test (DB integration)
        # A few Prisma specs hit the real Postgres against the seeded fixtures. Run
        # SERIALLY (--no-file-parallelism): they share the test-org/TEST project,
        # and parallel workers race the per-project ticketNumber allocation.
        run: >-
          npx vitest run --no-file-parallelism
          src/lib/files/__tests__/convert.test.ts
          src/lib/files/__tests__/ingest.test.ts
          src/lib/files/__tests__/propose.test.ts
          src/lib/ingest/__tests__/items.test.ts

      - name: Examples gate
        run: npm run check:examples

      - name: Build
        env:
          # Stub values just to satisfy Next's build-time env checks. Routes
          # don't execute, so real values aren't required.
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          DIRECT_URL: postgres://ci:ci@localhost:5432/ci
          GOOGLE_CLIENT_ID: ci
          GOOGLE_CLIENT_SECRET: ci
          GOOGLE_REDIRECT_URI: http://localhost:3000/api/auth/google/callback
          ALLOWED_EMAILS: ci@example.com
        run: npm run build

  # Dual-product build gate (Phase 3 one-image): release.yml builds ONE image,
  # so CI must still prove the app compiles under the pontis product. The unit
  # tests already exercise both products via per-case env overrides; this leg
  # compiles the pontis client bundle (NEXT_PUBLIC_PRODUCT is read by next.config.ts
  # at build). Reuses `check`'s install/generate; only the build env differs.
  build-pontis:
    runs-on: [self-hosted, jongodb]
    needs: check
    timeout-minutes: 15
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Prisma generate
        run: npx prisma generate
      - name: Build (PRODUCT=pontis)
        env:
          NEXT_PUBLIC_PRODUCT: pontis
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          DIRECT_URL: postgres://ci:ci@localhost:5432/ci
          GOOGLE_CLIENT_ID: ci
          GOOGLE_CLIENT_SECRET: ci
          GOOGLE_REDIRECT_URI: http://localhost:3000/api/auth/google/callback
          ALLOWED_EMAILS: ci@example.com
        run: npm run build

  e2e:
    runs-on: [self-hosted, jongodb]
    needs: check
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        # Hold the job until Postgres is accepting connections.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci
      DIRECT_URL: postgres://ci:ci@localhost:5432/ci
      GOOGLE_CLIENT_ID: ci
      GOOGLE_CLIENT_SECRET: ci
      GOOGLE_REDIRECT_URI: http://localhost:3000/api/auth/google/callback
      ALLOWED_EMAILS: ci@example.com
      # Enables the /api/testenv/sign-in route the Playwright fixtures use.
      E2E_TEST_AUTH: "1"
      # The dev server can exceed the runner's ~2GB Node default on this codebase.
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run e2e:install
      - run: npx prisma generate
      # Real schema + the deterministic test-org/alice/bob fixtures the specs
      # (smoke, a11y, chat) all sign in against. Create the cosmos/cosmos_app
      # roles first (the services: Postgres skips compose/init) so the
      # audit-immutability migration's GRANTs apply — see prisma/sql/ci-roles.sql.
      - name: Migrate + seed test fixtures
        run: |
          npx prisma db execute --file prisma/sql/ci-roles.sql
          npx prisma migrate deploy
          npx tsx prisma/seed/test-fixtures.ts
      - name: Start (dev) + run e2e
        # Serve with `next dev` (NODE_ENV=development), NOT `next build`/`next start`
        # (production). The /api/testenv/sign-in route is hard-disabled when
        # NODE_ENV==='production' (deliberate auth-bypass guard, above the
        # E2E_TEST_AUTH gate), so the Playwright sign-in fixture only works against
        # a non-production server. The production build is exercised by `check`.
        run: |
          npm run dev &
          # Wait for the server to accept requests before driving it. If it
          # never comes up, fail with a clear message instead of letting
          # Playwright run against a dead server (cryptic ECONNREFUSED ×retries).
          ready=0
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health >/dev/null; then ready=1; break; fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            echo "::error::server did not become ready on :3000 within ~120s"
            exit 1
          fi
          npm run e2e

  # Informational ONLY — the flaky dnd-kit drag journey. continue-on-error
  # means a failure here NEVER blocks the PR (the gate is the `check` + `e2e`
  # jobs above). The gated `e2e` run excludes e2e/interaction/** via
  # testIgnore in playwright.config.ts; this job opts back in with
  # E2E_INCLUDE_INTERACTION=1 and runs ONLY the drag spec.
  e2e-interaction:
    runs-on: [self-hosted, jongodb]
    needs: check
    continue-on-error: true
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        # Hold the job until Postgres is accepting connections.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci
      DIRECT_URL: postgres://ci:ci@localhost:5432/ci
      GOOGLE_CLIENT_ID: ci
      GOOGLE_CLIENT_SECRET: ci
      GOOGLE_REDIRECT_URI: http://localhost:3000/api/auth/google/callback
      ALLOWED_EMAILS: ci@example.com
      # Enables the /api/testenv/sign-in route the Playwright fixtures use.
      E2E_TEST_AUTH: "1"
      # Opts the e2e/interaction/** specs back IN (testIgnore drops them by
      # default — see playwright.config.ts).
      E2E_INCLUDE_INTERACTION: "1"
      # The dev server can exceed the runner's ~2GB Node default on this codebase.
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run e2e:install
      - run: npx prisma generate
      # Same deterministic test-org/alice/bob fixtures the gated e2e run uses.
      # Roles first (services: Postgres skips compose/init) — see ci-roles.sql.
      - name: Migrate + seed test fixtures
        run: |
          npx prisma db execute --file prisma/sql/ci-roles.sql
          npx prisma migrate deploy
          npx tsx prisma/seed/test-fixtures.ts
      - name: Start (dev) + run drag interaction spec
        # `next dev` (development), not build/start (production) — the test-auth
        # sign-in route is hard-disabled under NODE_ENV=production. See the e2e job.
        run: |
          npm run dev &
          ready=0
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health >/dev/null; then ready=1; break; fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            echo "::error::server did not become ready on :3000 within ~120s"
            exit 1
          fi
          npx playwright test e2e/interaction/journey-work-item-drag.spec.ts
