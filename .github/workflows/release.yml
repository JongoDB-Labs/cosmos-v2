# Signed SemVer container delivery → GHCR.
#
# Builds the multi-stage runtime + migrate images, tags them from
# package.json's `version` (SemVer + :latest + :sha-<sha>), generates a Syft
# SPDX SBOM attached to the image, signs BY DIGEST with cosign, and attaches a
# SLSA build-provenance attestation. Commercial signs keyless via GitHub OIDC →
# public Fulcio/Rekor; the `gov` path signs with a KMS/HSM key (public Rekor is
# unreachable/unacceptable in-boundary — spec §8 gate 7).
#
# Spec §8 control mapping:
#   SBOM (gate 6)            → 800-171 3.4.x   (component inventory)
#   Sign + provenance (g.7)  → 800-171 3.4.x / 3.14.x (integrity, supply chain)
#   SHA-pinned actions (g.8) → 800-171 3.1.1 / 3.4.x (least-privilege, config)
#
# All `uses:` are pinned to a commit SHA (human-readable version in trailing
# comment) — the security.yml config-assertion gate fails the build otherwise.
name: release

# Multi-arch (amd64+arm64) builds are slow under QEMU, so they run ONLY on a
# deliberate version tag — not on every push to main. Main/PR validation is
# handled by ci.yml + security.yml (fast, no image build). Cut a release by
# bumping package.json's version and pushing a `vX.Y.Z` tag (both the cosmos-v2
# and pontis images build from that one tag via the product matrix below).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      signing_mode:
        description: "Signing mode: commercial (keyless Fulcio/Rekor) or gov (KMS key)"
        type: choice
        options: [commercial, gov]
        default: commercial

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # IMAGE / MIGRATE_IMAGE are derived at runtime (with a lowercased owner) in the
  # "Normalize image refs" step below: GHCR repository names MUST be lowercase,
  # but the org owner `JongoDB-Labs` is mixed-case, which buildx rejects as an
  # invalid tag ("repository name must be lowercase").

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 120 # arm64 cross-build under QEMU is slow
    strategy:
      fail-fast: false # one product failing must not kill the other
      matrix:
        include:
          - product: cosmos
            image_base: cosmos-v2
          - product: pontis
            image_base: pontis
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # keyless cosign (OIDC → Fulcio) + provenance attestation
      attestations: write # actions/attest-build-provenance
    outputs:
      version: ${{ steps.version.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Derive VERSION from package.json
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing ${{ matrix.image_base }} v$VERSION"

      # GHCR repo names must be lowercase; the org owner (JongoDB-Labs) is mixed
      # case. Lowercase it once and export fully-qualified refs for every later
      # step (build / sbom / sign / attest), which all read ${{ env.IMAGE }}.
      - name: Normalize image refs (lowercase owner)
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE=ghcr.io/$OWNER/${{ matrix.image_base }}" >> "$GITHUB_ENV"
          echo "MIGRATE_IMAGE=ghcr.io/$OWNER/${{ matrix.image_base }}-migrate" >> "$GITHUB_ENV"

# QEMU enables cross-building linux/arm64 on the amd64 runner (multi-arch images).
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Runtime image — the default Dockerfile target. Push and capture the
      # immutable digest so cosign/attest/scan all operate by digest (not tag).
      - name: Build + push runtime image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            PRODUCT=${{ matrix.product }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          provenance: false # SLSA provenance is attached explicitly below by digest

      # Migrate image — one-shot job image from the Dockerfile `migrate` target.
      - name: Build + push migrate image
        id: build-migrate
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          target: migrate
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            PRODUCT=${{ matrix.product }}
          tags: |
            ${{ env.MIGRATE_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.MIGRATE_IMAGE }}:latest
            ${{ env.MIGRATE_IMAGE }}:sha-${{ github.sha }}
          provenance: false

      # SBOM (gate 6) — Syft SPDX-JSON of the pushed image, attached to the
      # registry as an SBOM attestation AND uploaded as a workflow artifact.
      - name: Generate + attach SBOM (Syft SPDX)
        uses: anchore/sbom-action@9246b90769f852b3a8921f330c59e0b3f439d6e9 # v0.20.1
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          # Per-product filename so the two matrix legs don't collide on the
          # uploaded artifact name.
          output-file: sbom-${{ matrix.image_base }}.spdx.json
          upload-artifact: true

      # Sign + provenance (gate 7) ------------------------------------------
      - name: Install cosign
        uses: sigstore/cosign-installer@fb28c2b6339dcd94da6e4cbcbc5e888961f6f8c3 # v3.9.0

      # COMMERCIAL: keyless — OIDC identity → public Fulcio cert, Rekor log.
      # The Rekor inclusion proof doubles as the external WORM anchor (spec §8.2).
      - name: cosign sign (commercial — keyless)
        if: ${{ github.event.inputs.signing_mode != 'gov' || matrix.product == 'pontis' }}
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            "${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"
          cosign sign --yes \
            "${{ env.MIGRATE_IMAGE }}@${{ steps.build-migrate.outputs.digest }}"

      # GOV: KMS/HSM key — public Fulcio/Rekor is unreachable/unacceptable
      # in-boundary. COSIGN_KEY is a KMS ref (e.g. awskms://…, gcpkms://…) or a
      # vaulted key; COSIGN_PASSWORD unlocks a file key. Self-hosted Sigstore is
      # the alternative; documented as a deployment decision (spec §8 gate 7).
      - name: cosign sign (gov — KMS key)
        if: ${{ github.event.inputs.signing_mode == 'gov' && matrix.product == 'cosmos' }}
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --yes --key "env://COSIGN_KEY" \
            "${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"
          cosign sign --yes --key "env://COSIGN_KEY" \
            "${{ env.MIGRATE_IMAGE }}@${{ steps.build-migrate.outputs.digest }}"

      # SLSA build provenance attestation, bound to the runtime image digest.
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
