# Signed SemVer container delivery → GHCR — native multi-arch via build-by-digest.
#
# Each arch builds the SINGLE cosmos-v2 image on its NATIVE runner (no QEMU) and
# pushes the runtime + migrate images BY DIGEST. One `merge` job then assembles the
# multi-arch manifest (docker buildx imagetools), applies the tags (SemVer +
# :latest + :sha-<sha>), generates a Syft SPDX SBOM, signs BY DIGEST with cosign,
# and attaches a SLSA build-provenance attestation. Every image is signed UNIFORMLY:
# keyless via GitHub OIDC → public Fulcio/Rekor ALWAYS, plus a KMS/HSM key WHEN
# secrets.COSIGN_KEY is configured (in-boundary gov verification where public Rekor
# is unreachable — spec §8 gate 7). The per-deployment product is a RUNTIME env
# (PRODUCT=<key>), not a build-arg.
#
# Native runners + a registry layer cache (mode=max) make this ~15-25 min cold and
# near-instant for no-op re-releases (the big MiniLM model + node_modules layers
# stay warm). arm64 uses GitHub's `ubuntu-24.04-arm` hosted runner — a paid
# larger-runner tier on PRIVATE repos that the org must enable, but it burns far
# fewer minutes than the old QEMU cross-build.
#
# Spec §8 control mapping:
#   SBOM (gate 6)            → 800-171 3.4.x   (component inventory)
#   Sign + provenance (g.7)  → 800-171 3.4.x / 3.14.x (integrity, supply chain)
#   SHA-pinned actions (g.8) → 800-171 3.1.1 / 3.4.x (least-privilege, config)
#
# All `uses:` are pinned to a commit SHA (human-readable version in trailing
# comment) — the security.yml config-assertion gate fails the build otherwise.
# (`imagetools` is the docker CLI and `ubuntu-24.04-arm` is a runner label —
# neither is an action, so there is nothing new to pin for the native-arch change.)
name: release

# Multi-arch builds run ONLY on a deliberate version tag — not every push to main.
# Main/PR validation is ci.yml + security.yml (fast, no image build). Cut a release
# by bumping package.json's version and pushing a `vX.Y.Z` tag (the single cosmos-v2
# image builds from that one tag; the per-deployment product is a runtime env, not a
# build-time matrix).
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # IMAGE / MIGRATE_IMAGE are derived per-job (lowercased owner) in the "Normalize
  # image refs" step: GHCR repository names MUST be lowercase, but the org owner
  # `JongoDB-Labs` is mixed-case, which buildx rejects as an invalid tag.

jobs:
  # ── Build one (product × arch) on its native runner, push BY DIGEST ──────────
  build:
    strategy:
      fail-fast: false # one product/arch failing must not kill the others
      matrix:
        include:
          # One image, two native arches. `product` stays `cosmos` so the baked
          # NEXT_PUBLIC_PRODUCT default is the neutral "cosmos" (the per-deployment
          # product is a RUNTIME env, not a build-arg — Phase 3 one-image collapse).
          - { product: cosmos, image_base: cosmos-v2, arch: amd64, runner: ubuntu-24.04 }
          - { product: cosmos, image_base: cosmos-v2, arch: arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60 # native build of the MiniLM-bearing image; cache warms it down
    permissions:
      contents: read
      packages: write # push image layers + by-digest manifests to GHCR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Derive VERSION from package.json
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building ${{ matrix.image_base }} v$VERSION (linux/${{ matrix.arch }})"

      - name: Normalize image refs (lowercase owner)
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          {
            echo "IMAGE=ghcr.io/$OWNER/${{ matrix.image_base }}"
            echo "MIGRATE_IMAGE=ghcr.io/$OWNER/${{ matrix.image_base }}-migrate"
            echo "POSTGRES_IMAGE=ghcr.io/$OWNER/${{ matrix.image_base }}-postgres"
          } >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Runtime image (default target) — push BY DIGEST (no tags); the merge job
      # assembles the multi-arch manifest + applies the tags. Registry cache
      # (mode=max) keeps the large MiniLM + node_modules layers warm across runs.
      - name: Build + push runtime (by digest)
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            PRODUCT=${{ matrix.product }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-${{ matrix.arch }},mode=max
          provenance: false # SLSA provenance is attached explicitly in `merge` by digest

      # Migrate image (the `migrate` Dockerfile target) — likewise by digest.
      - name: Build + push migrate (by digest)
        id: build-migrate
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: migrate
          platforms: linux/${{ matrix.arch }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            PRODUCT=${{ matrix.product }}
          outputs: type=image,name=${{ env.MIGRATE_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.MIGRATE_IMAGE }}:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.MIGRATE_IMAGE }}:buildcache-${{ matrix.arch }},mode=max
          provenance: false

      # Postgres image (pgvector + pgBackRest, compose/postgres/Dockerfile) — by
      # digest. Published so prod hosts PULL it instead of building locally
      # (enables a fully pull-only deployment; app + migrate are already pulled).
      - name: Build + push postgres (by digest)
        id: build-postgres
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: compose/postgres/Dockerfile
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.POSTGRES_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.POSTGRES_IMAGE }}:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.POSTGRES_IMAGE }}:buildcache-${{ matrix.arch }},mode=max
          provenance: false

      # Export the digests as files named by their digest; the merge job
      # collects every arch's digest to assemble the manifest list.
      - name: Export digests
        run: |
          mkdir -p /tmp/d/runtime /tmp/d/migrate /tmp/d/postgres
          touch "/tmp/d/runtime/${RUNTIME_DIGEST#sha256:}"
          touch "/tmp/d/migrate/${MIGRATE_DIGEST#sha256:}"
          touch "/tmp/d/postgres/${POSTGRES_DIGEST#sha256:}"
        env:
          RUNTIME_DIGEST: ${{ steps.build.outputs.digest }}
          MIGRATE_DIGEST: ${{ steps.build-migrate.outputs.digest }}
          POSTGRES_DIGEST: ${{ steps.build-postgres.outputs.digest }}

      - name: Upload digests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.image_base }}-${{ matrix.arch }}
          path: /tmp/d/*
          retention-days: 1
          if-no-files-found: error

  # ── Assemble the single multi-arch manifest, tag, SBOM, sign, attest ────────
  merge:
    needs: build
    # Run even if a build leg failed (!cancelled); the arch-count guard below
    # fails the job if either arch is missing.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Expose the merged manifest digests so the `chart` job (SP4) can pin the
    # Helm chart to the exact images this release just built + signed.
    outputs:
      runtime_digest: ${{ steps.manifest.outputs.runtime_digest }}
      migrate_digest: ${{ steps.manifest.outputs.migrate_digest }}
    # Expose whether COSIGN_KEY is configured as a job-level env so the KMS
    # signing step can gate on it without referencing secrets in an `if`
    # (actionlint disallows secrets context in step-level `if` conditions).
    env:
      HAS_KMS: ${{ secrets.COSIGN_KEY != '' }}
    permissions:
      contents: read
      packages: write # push the merged manifests + tags
      id-token: write # keyless cosign (OIDC → Fulcio) + provenance attestation
      attestations: write # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Derive VERSION from package.json
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Normalize image refs (lowercase owner)
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          {
            echo "IMAGE=ghcr.io/$OWNER/cosmos-v2"
            echo "MIGRATE_IMAGE=ghcr.io/$OWNER/cosmos-v2-migrate"
            echo "POSTGRES_IMAGE=ghcr.io/$OWNER/cosmos-v2-postgres"
          } >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Collect per-arch digests (runtime/ + migrate/ subdirs, one digest-named
      # file per arch) into a single tree.
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-cosmos-v2-*
          path: /tmp/d
          merge-multiple: true

      # Assemble the multi-arch manifest for runtime + migrate from the per-arch
      # digests and apply the tags. Guard that BOTH arches are present so a missing
      # arch fails the release rather than silently shipping a single-arch image.
      # Capture each merged (manifest-list) digest for sign/attest/SBOM by digest.
      - name: Create + push manifests
        id: manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SHA="sha-$GIT_SHA"
          # Guard: both arches must be present, else fail (no silent single-arch image).
          for kind in runtime migrate postgres; do
            n=0
            for f in "/tmp/d/$kind"/*; do [ -e "$f" ] && n=$((n + 1)); done
            [ "$n" -eq 2 ] || { echo "::error::expected 2 arch digests for $kind, found $n"; exit 1; }
          done
          runtime_refs=()
          for f in /tmp/d/runtime/*; do runtime_refs+=("$IMAGE@sha256:$(basename "$f")"); done
          migrate_refs=()
          for f in /tmp/d/migrate/*; do migrate_refs+=("$MIGRATE_IMAGE@sha256:$(basename "$f")"); done
          postgres_refs=()
          for f in /tmp/d/postgres/*; do postgres_refs+=("$POSTGRES_IMAGE@sha256:$(basename "$f")"); done
          docker buildx imagetools create \
            -t "$IMAGE:$VERSION" -t "$IMAGE:latest" -t "$IMAGE:$SHA" "${runtime_refs[@]}"
          docker buildx imagetools create \
            -t "$MIGRATE_IMAGE:$VERSION" -t "$MIGRATE_IMAGE:latest" -t "$MIGRATE_IMAGE:$SHA" "${migrate_refs[@]}"
          docker buildx imagetools create \
            -t "$POSTGRES_IMAGE:$VERSION" -t "$POSTGRES_IMAGE:latest" -t "$POSTGRES_IMAGE:$SHA" "${postgres_refs[@]}"
          RUNTIME_DIGEST="$(docker buildx imagetools inspect "$IMAGE:$VERSION" --format '{{.Manifest.Digest}}')"
          MIGRATE_DIGEST="$(docker buildx imagetools inspect "$MIGRATE_IMAGE:$VERSION" --format '{{.Manifest.Digest}}')"
          POSTGRES_DIGEST="$(docker buildx imagetools inspect "$POSTGRES_IMAGE:$VERSION" --format '{{.Manifest.Digest}}')"
          {
            echo "runtime_digest=$RUNTIME_DIGEST"
            echo "migrate_digest=$MIGRATE_DIGEST"
            echo "postgres_digest=$POSTGRES_DIGEST"
          } >> "$GITHUB_OUTPUT"
          echo "Merged $IMAGE:$VERSION → $RUNTIME_DIGEST"

      # SBOM (gate 6) — Syft SPDX-JSON of the merged runtime image, by digest.
      - name: Generate + attach SBOM (Syft SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE }}@${{ steps.manifest.outputs.runtime_digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true

      # Sign + provenance (gate 7) ------------------------------------------
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Uniform gov-grade signing for the SINGLE image (Phase 3). Keyless runs
      # ALWAYS (OIDC → public Fulcio cert + Rekor log; the Rekor inclusion proof
      # is the external WORM anchor — spec §8.2). KMS runs ADDITIONALLY whenever
      # COSIGN_KEY is configured (an in-boundary KMS/HSM ref: awskms://…,
      # gcpkms://…) so gov verifiers can trust the KMS cert without public Rekor.
      # Both attestations attach to the SAME digest. No product/signing_mode gate.
      - name: cosign sign (keyless — always)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "${{ env.IMAGE }}@${{ steps.manifest.outputs.runtime_digest }}"
          cosign sign --yes "${{ env.MIGRATE_IMAGE }}@${{ steps.manifest.outputs.migrate_digest }}"
          cosign sign --yes "${{ env.POSTGRES_IMAGE }}@${{ steps.manifest.outputs.postgres_digest }}"

      - name: cosign sign (KMS — when COSIGN_KEY configured)
        if: ${{ env.HAS_KMS == 'true' }}
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --yes --key "env://COSIGN_KEY" "${{ env.IMAGE }}@${{ steps.manifest.outputs.runtime_digest }}"
          cosign sign --yes --key "env://COSIGN_KEY" "${{ env.MIGRATE_IMAGE }}@${{ steps.manifest.outputs.migrate_digest }}"
          cosign sign --yes --key "env://COSIGN_KEY" "${{ env.POSTGRES_IMAGE }}@${{ steps.manifest.outputs.postgres_digest }}"

      # SLSA build provenance attestation, bound to the merged runtime manifest digest.
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.manifest.outputs.runtime_digest }}
          push-to-registry: true

      # Verify-after-sign GATE (self-healing) — re-resolve each PUBLISHED :VERSION
      # tag's digest and confirm the keyless signature is actually present +
      # verifiable. If it didn't persist (the intermittent miss that shipped
      # 2.102.0 unverifiable: `cosign sign` reported success but no .sig landed in
      # GHCR), re-sign and re-check; FAIL the release if an image cannot be made
      # verifiable. This makes a "green-but-unsigned" release impossible.
      - name: Verify signatures landed (gate)
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          id_regexp="^https://github.com/${REPO}/"
          issuer="https://token.actions.githubusercontent.com"
          verify_one() {
            img="$1"
            digest="$(docker buildx imagetools inspect "$img:$VERSION" --format '{{.Manifest.Digest}}')"
            for attempt in 1 2 3; do
              if cosign verify --certificate-identity-regexp "$id_regexp" \
                   --certificate-oidc-issuer "$issuer" "$img@$digest" >/dev/null 2>&1; then
                echo "verified: $img@$digest"
                return 0
              fi
              echo "::warning::no verifiable signature for $img@$digest (attempt $attempt) — re-signing"
              cosign sign --yes "$img@$digest" || true
              sleep "$((attempt * 5))"
            done
            echo "::error::$img:$VERSION ($digest) has no verifiable signature after retries"
            return 1
          }
          verify_one "$IMAGE"
          verify_one "$MIGRATE_IMAGE"
          verify_one "$POSTGRES_IMAGE"

  # ── Package, push, and sign the OCI Helm chart (SP4) ────────────────────────
  # The k8s delivery artifact gets the SAME gov-grade treatment as the images:
  # the chart is pinned to the EXACT image digests this release produced, pushed
  # to GHCR as an OCI artifact, then signed keyless (OIDC → Fulcio/Rekor) ALWAYS,
  # KMS ADDITIONALLY when COSIGN_KEY is set, with a SLSA provenance attestation
  # and a verify-after-sign gate. Tag→digest→signature is unbroken from image to
  # chart, so an airgap UDS/Zarf bundle (SP6) can verify the whole set offline.
  chart:
    needs: merge
    if: ${{ !cancelled() && needs.merge.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HAS_KMS: ${{ secrets.COSIGN_KEY != '' }}
    permissions:
      contents: read
      packages: write # push the OCI chart to GHCR
      id-token: write # keyless cosign (OIDC → Fulcio) + provenance
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Derive VERSION from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Normalize chart repo (lowercase owner)
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "CHART_REPO=ghcr.io/$OWNER/charts" >> "$GITHUB_ENV"
          echo "CHART_REF=ghcr.io/$OWNER/charts/cosmos" >> "$GITHUB_ENV"

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.16.4

      # cosign reads ~/.docker/config.json; helm OCI push uses it too — one login
      # serves both. (helm registry login added as belt-and-suspenders.)
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: helm registry login
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Pin the chart to the digests THIS release produced — the chart ships the
      # exact images that were just built, scanned, and signed (ephemeral edit on
      # the runner; the repo's values.yaml is untouched).
      - name: Pin chart to released image digests
        env:
          RUNTIME_DIGEST: ${{ needs.merge.outputs.runtime_digest }}
          MIGRATE_DIGEST: ${{ needs.merge.outputs.migrate_digest }}
        run: |
          set -euo pipefail
          command -v yq >/dev/null || { echo "::error::yq not on runner (GitHub ubuntu images ship mikefarah yq v4)"; exit 1; }
          yq -i '.image.app.digest = strenv(RUNTIME_DIGEST)' charts/cosmos/values.yaml
          yq -i '.image.migrate.digest = strenv(MIGRATE_DIGEST)' charts/cosmos/values.yaml
          echo "chart pins app=$RUNTIME_DIGEST migrate=$MIGRATE_DIGEST"

      - name: Lint + package chart
        id: pkg
        run: |
          set -euo pipefail
          V="${{ steps.version.outputs.version }}"
          helm lint charts/cosmos
          helm package charts/cosmos --version "$V" --app-version "$V" -d /tmp
          echo "tgz=/tmp/cosmos-$V.tgz" >> "$GITHUB_OUTPUT"

      - name: Push chart (OCI) + capture digest
        id: push
        run: |
          set -euo pipefail
          OUT="$(helm push "${{ steps.pkg.outputs.tgz }}" "oci://$CHART_REPO" 2>&1)"; echo "$OUT"
          DIGEST="$(printf '%s\n' "$OUT" | awk '/[Dd]igest:/{print $NF}')"
          [ -n "$DIGEST" ] || { echo "::error::could not parse pushed chart digest"; exit 1; }
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Pushed $CHART_REF@$DIGEST"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: cosign sign chart (keyless — always)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: cosign sign --yes "$CHART_REF@${{ steps.push.outputs.digest }}"

      - name: cosign sign chart (KMS — when COSIGN_KEY configured)
        if: ${{ env.HAS_KMS == 'true' }}
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: cosign sign --yes --key "env://COSIGN_KEY" "$CHART_REF@${{ steps.push.outputs.digest }}"

      - name: Attest chart provenance (SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.CHART_REF }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # Verify-after-sign GATE — the keyless signature must be present + verifiable,
      # same self-healing contract as the images. A green-but-unsigned chart is impossible.
      - name: Verify chart signature landed (gate)
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${REPO}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$CHART_REF@${{ steps.push.outputs.digest }}" >/dev/null
          echo "chart signature verified: $CHART_REF@${{ steps.push.outputs.digest }}"
