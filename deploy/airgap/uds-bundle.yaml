# UDS Bundle (SP6) — the single airgap deliverable: UDS Core + the cosmos app,
# one tarball, one deploy. This is the DoD disconnected-delivery milestone.
#
#   uds create deploy/airgap                 # pull every package's images → one bundle tarball
#   uds deploy uds-bundle-cosmos-stack-*.tar.zst --confirm   # deploy the whole stack offline
#
# Package order is deploy order: zarf init (in-cluster registry + agent) → UDS Core
# base (Istio + operator + policy) → identity (Keycloak, required by the console
# layers) → runtime-security (Falco) + monitoring (Prometheus/Grafana) → the cosmos
# app. Mirrors exactly what SP2 deployed layer-by-layer, now bundled.
#
# Pin every UDS Core layer to the SAME version as core-base (1.7.0) — mismatched
# layers risk CRD/operator drift (learned in SP2). `upstream` flavor for the lab;
# swap to `registry1` (Iron Bank) for a hardened/ATO build.
#
# The CrunchyData PGO package (deploy/airgap/pgo) sits between the UDS Core layers and
# cosmos: the cosmos chart creates a PostgresCluster the PGO operator reconciles, so the
# operator + its CRDs must land BEFORE cosmos. PGO ships as an OCI Helm chart (operator
# image + CRDs) and runs cluster-wide outside the UDS Package model (no netpol of its
# own — see deploy/airgap/pgo/zarf.yaml). With it bundled, `uds deploy` brings up the
# full COSMOS platform on a disconnected cluster from one tarball.
kind: UDSBundle
metadata:
  name: cosmos-stack
  version: "2.103.0"
  description: "COSMOS airgap stack — UDS Core (Istio/Keycloak/Falco/monitoring) + cosmos"

packages:
  # Zarf init — in-cluster registry + mutating agent (seeds + rewrites all images).
  - name: init
    repository: ghcr.io/defenseunicorns/packages/init
    ref: v0.79.0

  # UDS Core functional layers (upstream flavor, all 1.7.0).
  - name: core-base
    repository: ghcr.io/defenseunicorns/packages/uds/core-base
    ref: 1.7.0-upstream
  - name: core-identity-authorization
    repository: ghcr.io/defenseunicorns/packages/uds/core-identity-authorization
    ref: 1.7.0-upstream
  - name: core-runtime-security
    repository: ghcr.io/defenseunicorns/packages/uds/core-runtime-security
    ref: 1.7.0-upstream
  - name: core-monitoring
    repository: ghcr.io/defenseunicorns/packages/uds/core-monitoring
    ref: 1.7.0-upstream

  # CrunchyData PGO — the DB control plane (operator + CRDs). Must precede cosmos so
  # the PostgresCluster CR the cosmos chart creates has its CRDs + reconciler ready.
  - name: cosmos-pgo
    path: "pgo"
    ref: "6.0.2"

  # MinIO Operator — S3 control plane (the TLS Tenant for the layers below + pgBackRest
  # repo2). Local package; must precede the S3 consumers. Operator + Tenant runtime images.
  - name: minio-operator
    path: "minio-operator"
    ref: "7.1.1"

  # core-logging (Loki) + core-backup-restore (Velero) — the S3-backed observability +
  # backup layers (items 5-6), pinned to core-base 1.7.0. Their S3 ENDPOINT/BUCKET point
  # at the MinIO Tenant (https://minio.minio.svc:443) via overrides (Loki) / Zarf vars
  # (Velero); the S3 ACCESS KEYS + the uds-trust-bundle CA are supplied at `uds deploy`
  # time (SOPS/--set), NOT baked in. Full override blocks + trust-bundle wiring are in the
  # runbook "Storage stack" section.
  - name: core-logging
    repository: ghcr.io/defenseunicorns/packages/uds/core-logging
    ref: 1.7.0-upstream
  - name: core-backup-restore
    repository: ghcr.io/defenseunicorns/packages/uds/core-backup-restore
    ref: 1.7.0-upstream

  # COSMOS app — the SP5 Zarf package (built from ./zarf.yaml in this same dir).
  - name: cosmos
    path: "."
    ref: "2.103.0"
