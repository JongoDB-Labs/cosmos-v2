# Grafana dashboard provider — loads the COSMOS dashboard JSON from disk (SI-4).
apiVersion: 1

providers:
  - name: cosmos
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
