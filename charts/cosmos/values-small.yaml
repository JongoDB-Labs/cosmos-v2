# Small profile — minimal footprint (single-node / dev). Apply with:
#   helm install ... -f values-small.yaml
app:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      memory: 768Mi
# Component knobs added in later tasks:
# postgres: { instances: 1, storage: 10Gi }   # T3
# minio:    { servers: 1, storage: 10Gi }      # T2
