# ─────────────────────────────────────────────────────────────────────────────
# cosmos chart — default (medium) values. Override with values-small/large.yaml
# (sizing) and values-posture-dod.yaml (hardening). Component sections (postgres,
# minio, …) are filled in task-by-task as we add each template.
# ─────────────────────────────────────────────────────────────────────────────

# Images are DIGEST-pinned to the cosign-verified 2.102.2 release (multi-arch index
# digest — containerd resolves amd64 on RKE2, arm64 elsewhere). Tag→digest is the
# supply-chain guarantee from the signing pipeline; the chart inherits it.
image:
  app:
    repo: ghcr.io/jongodb-labs/cosmos-v2
    digest: "sha256:62275339aa9372b837f6376d26b890238a7d8f7b035b03af91f777419e0d3361"
  migrate:
    repo: ghcr.io/jongodb-labs/cosmos-v2-migrate
    digest: "sha256:b1294c50d9590beb9f784852a9c07423c5814df9fbc50c39890036eb252a41a6"
  pullPolicy: IfNotPresent

# App workload sizing (small/large profiles override these).
app:
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

# Security posture: baseline | dod. The dod overlay flips FIPS, strict netpol,
# 1095-day audit retention, external S3, registry1 (Iron Bank) images, enforced SSO.
posture: baseline

# Istio exposure via the UDS Package CR (host under the tenant gateway).
# `host`.`domain` = the external FQDN the app is reached at (e.g. cosmos.uds.dev);
# `domain` must match the UDS cluster domain (UDS_DOMAIN, default uds.dev).
expose:
  host: cosmos
  domain: uds.dev

# App-level SSO (server-side OIDC) against the substrate Keycloak. When enabled, the
# UDS Package creates the Keycloak client + a secret, and the chart adds the egress
# allow the app needs to reach Keycloak (UDS does NOT auto-add it — see uds-package.yaml).
# The IdpConnection row (which actually turns login on for an org) is written by the
# `prisma/seed/wire-keycloak-idp.ts` seed, sealing this client's secret into the DB.
sso:
  enabled: true
  clientId: cosmos-acme            # the Keycloak client (realm `uds`)
  name: "COSMOS — acme (demo)"     # human label shown in Keycloak
  orgSlug: acme                    # the cosmos org this client logs into (redirect path + seed)
  secretName: cosmos-sso-acme      # k8s Secret the UDS operator writes the client creds to

# Object storage — single-instance MinIO for the lab (MinIO Operator / external
# GovCloud S3 is the prod path per north-star §2). Creds live in a Secret,
# SOPS-managed from T4 (created out-of-band for now).
minio:
  image: minio/minio@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
  mcImage: minio/mc@sha256:aead63c77f9db9107f1696fb08ecb0faeda23729cde94b0f663edf4fe09728e3
  credsSecret: cosmos-minio-creds
  storage: 10Gi
  wormRetentionDays: 3650
  buckets:
    uploads: cosmos-uploads
    backups: cosmos-pgbackrest
    auditWorm: cosmos-audit-worm

# PostgresCluster (CrunchyData PGO). pgvector ships in the crunchy-postgres image.
postgres:
  version: 16
  instances: 1
  storage: 5Gi
  backupStorage: 5Gi
  psqlImage: postgres:16-alpine   # migrate hook's create-app-role init container (needs psql)
  # pgBackRest repo2 = MinIO Operator Tenant S3 over TLS, ALONGSIDE the local repo1.
  # When enabled, the chart adds repo2 to the PostgresCluster + a cosmos->minio egress
  # (uds-package.yaml). Requires: the MinIO Tenant (S3 at endpoint below) + the SOPS
  # secret `secretName` holding `s3.conf` (repo2-s3-key/secret) + `ca.crt` (the Tenant
  # CA = cluster CA). endpoint is the Tenant Service host (HTTPS:443; pgBackRest S3 is
  # always TLS). NOTE the egress to ns minio must be PORTLESS — the Tenant Service is
  # 443->targetPort 9000, so a port-443 netpol drops post-DNAT (runbook gotcha #15).
  backups:
    s3:
      enabled: false
      bucket: cosmos-pgbackrest
      endpoint: minio.minio.svc          # MinIO Operator Tenant Service (ns minio)
      region: us-east-1                  # required by the S3 API; MinIO ignores it
      secretName: cosmos-pgbackrest-s3
      schedules:
        full: "0 1 * * 0"                # weekly full (Sun 01:00)
        incremental: "0 1 * * 1-6"       # daily incremental

# Gov audit/compliance ops (SP3) — CronJobs/Jobs on the migrate image (carries
# scripts/dsop/*), connecting over the same verified PGO TLS as the app.
ops:
  verifyAuditChain:
    schedule: "0 */6 * * *"        # AU-9 tamper-evidence — every 6h
