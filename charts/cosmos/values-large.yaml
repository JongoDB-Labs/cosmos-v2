# Large profile — HA / production scale. Apply with:
#   helm install ... -f values-large.yaml
app:
  replicas: 3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi
# Component knobs added in later tasks:
