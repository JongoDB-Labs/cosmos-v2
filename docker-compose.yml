name: cosmos-v2
services:
  cosmos-postgres:
    # pgvector + pgBackRest Postgres. The base pgvector image satisfies the
    # 20260606040000_add_pgvector migration (`CREATE EXTENSION vector` + vector(384)
    # columns + HNSW indexes); the local compose/postgres/Dockerfile layers pgBackRest
    # on top for WAL archiving + base backups to the in-boundary MinIO S3 repo (CP-9/10).
    build:
      context: .
      dockerfile: compose/postgres/Dockerfile
    image: cosmos-v2-postgres:dev
    environment:
      POSTGRES_USER: cosmos
      POSTGRES_PASSWORD: cosmos
      POSTGRES_DB: cosmos
      # Consumed by compose/init/01-app-role.sh to create the cosmos_app login role.
      COSMOS_APP_PASSWORD: ${COSMOS_APP_PASSWORD:-cosmos_app}
      # pgBackRest repo (MinIO S3) creds + repo cipher pass — consumed by pgbackrest.conf
      # via env-var interpolation is NOT supported, so they are written into
      # /etc/pgbackrest/pgbackrest.conf by the entrypoint wrapper at start (see Dockerfile).
      PGBACKREST_REPO1_S3_KEY: ${S3_ACCESS_KEY:-cosmos-app}
      PGBACKREST_REPO1_S3_KEY_SECRET: ${S3_SECRET_KEY:-cosmos-app-secret}
      PGBACKREST_REPO1_CIPHER_PASS: ${PGBACKREST_CIPHER_PASS:-change-me-backup-cipher}
      PGBACKREST_REPO1_S3_ENDPOINT: ${S3_ENDPOINT_HOST:-cosmos-minio}
    # archive_mode/archive_command/wal_level are set as postgres -c flags so they take
    # effect WITHOUT mutating the persistent datadir's postgresql.conf (clean image rebuilds).
    command:
      - postgres
      - -c
      - archive_mode=on
      # Wrapper skips (exit 0) until the stanza is created, so the postgres first-boot
      # bootstrap can't stall on a pre-stanza archive-push; real pushes start after
      # stanza-create. Name contains "pgbackrest" (pgBackRest validates archive_command
      # references it). See compose/postgres/pgbackrest-archive-push.sh.
      - -c
      - archive_command=/usr/local/bin/pgbackrest-archive-push.sh %p
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=3
      - -c
      - archive_timeout=300
      # Place the Unix socket on a shared volume so the cosmos-backup one-shot can run a
      # local-mode pgBackRest backup (reads datadir from the shared pgdata volume +
      # connects to PG over this socket) without a TLS/SSH pgBackRest server.
      - -c
      - unix_socket_directories=/var/run/postgresql,/var/run/cosmos-pgsock
    volumes:
      - cosmos-pgdata:/var/lib/postgresql/data
      - cosmos-pgsock:/var/run/cosmos-pgsock
      # pgBackRest state dir (stanza/lock-ledger AND the .stanza-ready marker) on a NAMED
      # volume so it SURVIVES container recreate (image rebuild, down/up, --force-recreate,
      # host reboot). If this lived in the writable layer the marker would vanish on
      # recreate and pgbackrest-archive-push.sh would silently skip every WAL segment →
      # un-archived WAL gets recycled → unrecoverable PITR/RPO hole (CP-9/CP-10). The
      # Dockerfile chowns this path to postgres:postgres so the fresh volume inherits it.
      - cosmos-pgbackrest-state:/var/lib/pgbackrest
      # init scripts run ONCE at first DB init (empty volume), before migrations.
      - ./compose/init:/docker-entrypoint-initdb.d:ro
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "cosmos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: generate a self-signed TLS cert for MinIO into the shared certs volume so
  # MinIO serves HTTPS (encryption in transit — 3.8.6/3.13.8; and pgBackRest's S3 repo
  # REQUIRES TLS). Cert lives only in the volume, never in git. Alpine+openssl.
  minio-certs:
    image: alpine@sha256:48b0309ca019d89d40f670aa1bc06e426dc0931948452e8491e3d65087abc07d
    command:
      - /bin/sh
      - -c
      - "apk add --no-cache openssl >/dev/null && /bin/sh /gen-certs.sh"
    volumes:
      - cosmos-minio-certs:/certs
      - ./compose/minio/gen-certs.sh:/gen-certs.sh:ro

  # In-boundary S3-compatible object storage. For gov this is swapped for GovCloud /
  # Assured-Workloads S3 (identical API — only endpoint/creds change). API port is
  # NOT published to the host (internal compose network only); console is published on
  # 9001 for operator inspection (v1 holds 8080; v2 caddy holds 8090; 9000/9001 free).
  # Serves HTTPS using the cert in /root/.minio/certs (from the certs volume).
  cosmos-minio:
    image: minio/minio@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cosmos-minio-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cosmos-minio-root-secret}
    ports:
      # Console only — the S3 API (9000) stays internal to the compose network.
      - "9001:9001"
    volumes:
      - cosmos-minio-data:/data
      - cosmos-minio-certs:/root/.minio/certs:ro
    depends_on:
      minio-certs:
        condition: service_completed_successfully
    healthcheck:
      # curl -k against the MinIO liveness endpoint over HTTPS (-k: self-signed internal
      # cert; TLS still on). The image ships curl; mc has no preconfigured alias here.
      test: ["CMD", "curl", "-skf", "https://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot: creates the 3 buckets (audit-worm object-locked, COMPLIANCE retention)
  # + the two least-privilege service accounts. Exits 0; postgres/cosmos depend on it.
  minio-init:
    image: minio/mc@sha256:aead63c77f9db9107f1696fb08ecb0faeda23729cde94b0f663edf4fe09728e3
    depends_on:
      cosmos-minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: https://cosmos-minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cosmos-minio-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cosmos-minio-root-secret}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-cosmos-app}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-cosmos-app-secret}
      WORM_ACCESS_KEY: ${WORM_ACCESS_KEY:-cosmos-worm}
      WORM_SECRET_KEY: ${WORM_SECRET_KEY:-cosmos-worm-secret}
      WORM_RETENTION_DAYS: ${WORM_RETENTION_DAYS:-3650}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./compose/minio/init.sh:/init.sh:ro

  cosmos-migrate:
    # Dedicated migrate image (Dockerfile `migrate` target = build stage with the full
    # prisma toolchain). Built by: docker build --target migrate -t cosmos-v2-migrate:dev .
    image: cosmos-v2-migrate:dev
    env_file: .env
    depends_on:
      cosmos-postgres:
        condition: service_healthy

  cosmos:
    image: cosmos-v2:dev
    # env_file supplies SSO_VAULT_KEY (the OIDC client-secret vault master key) +
    # INTERNAL_ADMINS (break-glass allowlist) to the app. In PROD inject
    # SSO_VAULT_KEY as a Docker secret, not a plaintext env var (see .env.example).
    env_file: .env
    # The app runs DML as the least-privilege non-owner cosmos_app role (no UPDATE/
    # DELETE/TRUNCATE on audit_logs/egress_decisions — AU-9). Migrations run as the
    # owner (cosmos) via cosmos-migrate. `environment:` overrides `env_file:`.
    environment:
      DATABASE_URL: postgres://cosmos_app:${COSMOS_APP_PASSWORD:-cosmos_app}@cosmos-postgres:5432/cosmos
      DIRECT_URL: postgres://cosmos_app:${COSMOS_APP_PASSWORD:-cosmos_app}@cosmos-postgres:5432/cosmos
      # In-boundary object storage (MinIO over HTTPS). The app's key is RW on
      # cosmos-uploads only (least privilege — NO access to the backup repo or audit-worm).
      # NODE_EXTRA_CA_CERTS trusts the internal self-signed cert WITHOUT disabling TLS
      # verification globally (gov-defensible: a known internal CA, encryption in transit).
      STORAGE_ADAPTER: s3
      S3_ENDPOINT: https://cosmos-minio:9000
      S3_BUCKET: cosmos-uploads
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-cosmos-app}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-cosmos-app-secret}
      NODE_EXTRA_CA_CERTS: /etc/cosmos/minio-ca/public.crt
      # OBSERVE-ONLY OTel export (SI-4). Points at the in-boundary otel-collector. The
      # exporter TOLERATES the collector being absent: when the `observability` profile is
      # NOT up, export attempts log + retry and the app keeps running (base `up` is lean).
      # In gov, repoint OTEL_EXPORTER_OTLP_ENDPOINT at an enterprise OTel/SIEM backend.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: cosmos-v2
      # Nango (COMMERCIAL-ONLY connector breadth). NANGO_HOST is the INTERNAL compose
      # URL (the app talks to Nango server-side only); NANGO_SECRET_KEY is a PLATFORM
      # secret from .env (placeholder in .env.example; inject as a Docker secret in
      # prod). When the `nango` profile is NOT up these are harmless — the wrapper's
      # nangoEnabled() guard short-circuits and the connector degrades gracefully. The
      # gov-block is code-enforced regardless of these values.
      NANGO_HOST: ${NANGO_HOST:-http://cosmos-nango-server:3003}
      NANGO_SECRET_KEY: ${NANGO_SECRET_KEY:-}
    volumes:
      - cosmos-minio-certs:/etc/cosmos/minio-ca:ro
    depends_on:
      cosmos-migrate:
        condition: service_completed_successfully
      cosmos-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3

  reverse-proxy:
    image: caddy@sha256:cb9d71ad83182011b79355cd57692686374bd78d6fe327efe0ff8507da03ab13
    ports:
      # host 8080 is taken by the v1 stack; expose v2's proxy on 8090.
      - "8090:80"
    volumes:
      - ./compose/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - cosmos

  # ── Cutover reverse proxy (per-tenant v1/v2 routing + per-org write-freeze) ──────────────
  # A SEPARATE Caddy from `reverse-proxy` above (the app proxy). It sits in front of the v1
  # (source) + v2 (target) stacks during a per-tenant cutover and is driven LIVE via the Caddy
  # admin API by scripts/cutover/lib/proxy-control.ts (freeze/flip/rollback). See
  # compose/cutover-proxy/README.md. The admin API listens INTERNAL-ONLY (localhost:2019, NOT
  # exposed to the host) per the prod-intent base config; the synthetic acceptance boots its own
  # config that exposes admin on a free host port. `cutover` profile ⇒ off by default.
  cutover-proxy:
    image: caddy@sha256:cb9d71ad83182011b79355cd57692686374bd78d6fe327efe0ff8507da03ab13
    profiles: ["cutover"]
    command: ["caddy", "run", "--config", "/etc/caddy/caddy.base.json"]
    ports:
      # host 8090 is taken by the app proxy; expose the cutover proxy on 8091.
      - "8091:80"
    volumes:
      - ./compose/cutover-proxy/caddy.base.json:/etc/caddy/caddy.base.json:ro

  # One-shot periodic Postgres backup to the MinIO S3 repo (CP-9). Run on demand or on
  # a host cron / scheduler: `docker compose run --rm cosmos-backup`. Full weekly + incr
  # daily is the documented schedule (see docs/runbooks/backup-dr.md). Shares the postgres
  # image so it has pgBackRest + the same /etc/pgbackrest/pgbackrest.conf generation.
  cosmos-backup:
    image: cosmos-v2-postgres:dev
    profiles: ["ops"]
    environment:
      PGBACKREST_REPO1_S3_KEY: ${S3_ACCESS_KEY:-cosmos-app}
      PGBACKREST_REPO1_S3_KEY_SECRET: ${S3_SECRET_KEY:-cosmos-app-secret}
      PGBACKREST_REPO1_CIPHER_PASS: ${PGBACKREST_CIPHER_PASS:-change-me-backup-cipher}
      PGBACKREST_REPO1_S3_ENDPOINT: ${S3_ENDPOINT_HOST:-cosmos-minio}
      # libpq connects over the shared Unix socket (pg_backup_start/stop); files are
      # read locally from the shared pgdata volume.
      PGBACKREST_PGHOST: /var/run/cosmos-pgsock
      PGBACKREST_BACKUP_TYPE: ${PGBACKREST_BACKUP_TYPE:-incr}
    entrypoint: ["/usr/local/bin/cosmos-backup.sh"]
    volumes:
      - cosmos-pgdata:/var/lib/postgresql/data
      - cosmos-pgsock:/var/run/cosmos-pgsock
      # Share the SAME pgBackRest state dir as cosmos-postgres so the stanza/lock ledger
      # and the .stanza-ready marker are consistent across the postgres service and this
      # backup one-shot (and stanza-create, which runs via `exec` inside cosmos-postgres).
      - cosmos-pgbackrest-state:/var/lib/pgbackrest
    depends_on:
      cosmos-postgres:
        condition: service_healthy

  # One-shot audit WORM export (AU-9 offsite immutable anchor). Dumps audit_logs +
  # egress_decisions since the last export to the object-locked cosmos-audit-worm bucket
  # with a signed sha256 manifest. Run on demand or on a scheduler:
  # `docker compose run --rm audit-worm-export`. Uses the WRITE-ONLY worm key.
  audit-worm-export:
    image: cosmos-v2-migrate:dev
    profiles: ["ops"]
    environment:
      # Reads the audit tables as the LEAST-PRIVILEGE cosmos_app role (SELECT-only on the
      # audit tables — it is REVOKEd UPDATE/DELETE/TRUNCATE and does NOT own the append-only
      # triggers). NOT the owner (cosmos) role: the exporter never needs DDL/DML, only SELECT.
      DATABASE_URL: ${WORM_EXPORT_DATABASE_URL:-postgres://cosmos_app:${COSMOS_APP_PASSWORD:-cosmos_app}@cosmos-postgres:5432/cosmos}
      WORM_S3_ENDPOINT: https://cosmos-minio:9000
      WORM_S3_BUCKET: cosmos-audit-worm
      WORM_S3_ACCESS_KEY: ${WORM_ACCESS_KEY:-cosmos-worm}
      WORM_S3_SECRET_KEY: ${WORM_SECRET_KEY:-cosmos-worm-secret}
      WORM_MANIFEST_HMAC_KEY: ${WORM_MANIFEST_HMAC_KEY:-change-me-manifest-hmac}
      NODE_EXTRA_CA_CERTS: /etc/cosmos/minio-ca/public.crt
    entrypoint: ["node", "scripts/audit-worm-export.mjs"]
    volumes:
      - cosmos-minio-certs:/etc/cosmos/minio-ca:ro
    depends_on:
      cosmos-postgres:
        condition: service_healthy
      cosmos-minio:
        condition: service_healthy

  # One-shot vault-key RE-WRAP (IA-5 / SC 3.13.10). Re-wraps every vault-sealed secret
  # (today: idp_connections.client_secret_enc) to the keyring's ACTIVE kid so an old key
  # can be retired — the engineering half of a rotate-then-retire cycle. Run on demand:
  #   sudo docker compose --profile ops run --rm rotate-vault-key          # re-wrap
  #   sudo docker compose --profile ops run --rm rotate-vault-key --check  # completeness gate
  # Uses the migrate image (full src/ + tsx + prisma toolchain) so it imports the SAME
  # vault TS the app uses (single source of truth) — invoked via tsx, like the SSO seed.
  rotate-vault-key:
    image: cosmos-v2-migrate:dev
    profiles: ["ops"]
    # env_file supplies the vault keyring (SSO_VAULT_KEYS + SSO_VAULT_ACTIVE_KID, or the
    # legacy single SSO_VAULT_KEY). `environment:` below overrides DATABASE_URL to the
    # LEAST-PRIVILEGE cosmos_app role — re-wrap is SELECT + UPDATE on idp_connections, NOT
    # DDL, so it must NOT run as the owner (cosmos).
    env_file: .env
    environment:
      DATABASE_URL: postgres://cosmos_app:${COSMOS_APP_PASSWORD:-cosmos_app}@cosmos-postgres:5432/cosmos
    entrypoint:
      ["node_modules/.bin/tsx", "scripts/dsop/rotate-vault-key.mjs"]
    depends_on:
      cosmos-postgres:
        condition: service_healthy

  # One-shot in-DB audit hash-chain VERIFY (AU-9 tamper-EVIDENCE gate). Calls the in-DB
  # verify_audit_chain() on audit_logs + egress_decisions and exits NON-ZERO if either
  # cryptographic hash-chain is broken (post-hoc edit / forged-or-deleted row). Run on
  # demand or on a scheduler (pairs with the audit-worm-export anchor):
  #   sudo docker compose --profile ops run --rm verify-audit-chain
  # Uses the migrate image (has the `pg` dep + scripts/). Reads as the LEAST-PRIVILEGE
  # cosmos_app role — verification is SELECT-only (+ EXECUTE on verify_audit_chain + SELECT
  # on audit_chain_checkpoint), NEVER the owner. The WORM_MANIFEST_HMAC_KEY lets it ALSO
  # verify the latest AU-11 retention-purge checkpoint's HMAC sig (forged-checkpoint
  # detection — the SQL function anchors structurally, this wrapper checks the sig). See
  # docs/runbooks/audit-integrity.md.
  verify-audit-chain:
    image: cosmos-v2-migrate:dev
    profiles: ["ops"]
    environment:
      DATABASE_URL: postgres://cosmos_app:${COSMOS_APP_PASSWORD:-cosmos_app}@cosmos-postgres:5432/cosmos
      WORM_MANIFEST_HMAC_KEY: ${WORM_MANIFEST_HMAC_KEY:-change-me-manifest-hmac}
    entrypoint: ["node", "scripts/dsop/verify-audit-chain.mjs"]
    depends_on:
      cosmos-postgres:
        condition: service_healthy

  # One-shot AU-11 audit RETENTION-PURGE (the ONLY sanctioned audit-delete path). Deletes
  # rows older than the retention floor from audit_logs / egress_decisions WITHOUT breaking
  # the AU-9 hash-chain: records a signed chain-checkpoint at the boundary, then deletes
  # rows <= N in ONE owner txn (SET LOCAL session_replication_role = replica — the only way
  # to bypass the append-only trigger, for that txn only). Connects as the OWNER (cosmos)
  # from .env's DATABASE_URL — NOT cosmos_app (which can't delete or set replica role).
  #
  # ORDERING IS LOAD-BEARING — run a WORM export FIRST so the purged rows are anchored
  # offsite; the script REFUSES if N > the latest WORM-attested toSeq (reads the bucket's
  # signed manifest keys). NEVER purges below the 1095-day gov floor unless the explicit,
  # TEST-ONLY env AUDIT_PURGE_ALLOW_BELOW_FLOOR_DAYS is set. Example:
  #   sudo docker compose --profile ops run --rm audit-worm-export        # 1. anchor offsite
  #   sudo docker compose --profile ops run --rm \
  #     -e PURGE_TABLE=audit_logs -e PURGE_RETENTION_DAYS=1095 purge-audit # 2. purge
  #   sudo docker compose --profile ops run --rm verify-audit-chain        # 3. confirm intact
  # See docs/runbooks/audit-integrity.md (owner-only, WORM-first, verify-after).
  purge-audit:
    image: cosmos-v2-migrate:dev
    profiles: ["ops"]
    # env_file supplies the OWNER DATABASE_URL (cosmos) — the purge MUST run as the owner.
    env_file: .env
    environment:
      # WORM env so the script can read the latest attested toSeq (the WORM-ordering guard),
      # unless --worm-toseq is passed. Same bucket/creds the exporter writes.
      WORM_S3_ENDPOINT: https://cosmos-minio:9000
      WORM_S3_BUCKET: cosmos-audit-worm
      WORM_S3_ACCESS_KEY: ${WORM_ACCESS_KEY:-cosmos-worm}
      WORM_S3_SECRET_KEY: ${WORM_SECRET_KEY:-cosmos-worm-secret}
      WORM_MANIFEST_HMAC_KEY: ${WORM_MANIFEST_HMAC_KEY:-change-me-manifest-hmac}
      NODE_EXTRA_CA_CERTS: /etc/cosmos/minio-ca/public.crt
    # PURGE_TABLE / PURGE_RETENTION_DAYS / PURGE_EXTRA_ARGS map to the script's flags via the
    # shell entrypoint so they can be supplied with `-e` at `run` time. The `$$` escapes
    # docker-compose's OWN config-time interpolation so the CONTAINER's /bin/sh expands them
    # from the container env (where `-e` overrides land — NOT the host env). Defaults:
    # audit_logs / 1095d (gov floor) / no extra args.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        node scripts/dsop/purge-audit.mjs
        --table "$${PURGE_TABLE:-audit_logs}"
        --retention-days "$${PURGE_RETENTION_DAYS:-1095}"
        $${PURGE_EXTRA_ARGS:-}
    volumes:
      - cosmos-minio-certs:/etc/cosmos/minio-ca:ro
    depends_on:
      cosmos-postgres:
        condition: service_healthy

  # ── Observability stack (SI-4 / 800-171 3.14.6-3.14.7) — all under the `observability`
  # profile so base `up` stays lean (like the `ops` profile). All OSS, digest-pinned. The
  # collector OTLP ports are NOT published to the host (internal compose network is enough);
  # only the human UIs (Grafana / Jaeger / Prometheus) are exposed, on FREE host ports
  # (v1 holds 8080; v2 caddy 8090; MinIO 9001). Gov points these images — or just the
  # collector exporters — at an enterprise OTel/SIEM backend; only endpoints change. ───────

  # OTel Collector (contrib): receives OTLP from the app, exports metrics to a Prometheus
  # scrape endpoint (:8889) + traces to Jaeger (OTLP). No host ports — internal only.
  otel-collector:
    image: otel/opentelemetry-collector-contrib@sha256:e39311df1f3d941923c00da79ac7ba6269124a870ee87e3c3ad24d60f8aee4d2
    profiles: ["observability"]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./compose/observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    # No container healthcheck: the contrib image is distroless (no shell / wget / curl), so
    # an in-container probe can't run. The collector's health_check extension still serves
    # 200 on :13133, and Prometheus scrapes the collector — so its liveness shows up as the
    # `up` metric (the SidecarDown alert covers it). Compose deps use service_started.

  # Prometheus: scrapes the collector (app metrics) + sidecars; holds the alert rules.
  prometheus:
    image: prom/prometheus@sha256:6927e0919a144aa7616fd0137d4816816d42f6b816de3af269ab065250859a62
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./compose/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./compose/observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - cosmos-prometheus-data:/prometheus
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Jaeger all-in-one: trace store + UI. OTLP receiver enabled so the collector can export.
  jaeger:
    image: jaegertracing/all-in-one@sha256:34e3d18e0f2eeb9abd9bb53d0dc7abaf2a5b1c884fdca575093af3126811a9d3
    profiles: ["observability"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      # Jaeger UI only. The OTLP ingest ports (4317/4318) stay internal — the collector
      # reaches them over the compose network.
      - "16686:16686"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:14269/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Grafana: provisioned Prometheus + Jaeger datasources + the COSMOS dashboard.
  grafana:
    image: grafana/grafana@sha256:8b37a2f028f164ce7b9889e1765b9d6ee23fec80f871d156fbf436d6198d32b7
    profiles: ["observability"]
    environment:
      # Admin creds from env (placeholders in .env.example; NEVER commit real values).
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # In-boundary, single-operator: no sign-up, no anonymous, no phone-home.
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    ports:
      - "3009:3000"
    volumes:
      - ./compose/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./compose/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - cosmos-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Nango (self-hosted OSS unified-API / OAuth broker) — COMMERCIAL connector
  # breadth (~180 providers), wired through the v2.10 connector registry + the egress
  # chokepoint. ALL under the `nango` profile so base `up` stays lean (like `ops` /
  # `observability`). The app reaches `cosmos-nango-server` over the INTERNAL compose
  # network only; its DB + Redis are NOT host-published. Only the connect-flow ports
  # (the API server + the Connect UI) are exposed on FREE host ports for the OAuth/
  # API-key grant dance (v1 holds 8080; v2 caddy 8090; Grafana 3009; Jaeger 16686;
  # Prom 9090; MinIO 9001 — so Nango takes 3013 [server] + 3019 [connect UI]).
  #
  # Versions PINNED to a known-good self-host shape (researched 2026-06-06 against
  # NangoHQ/nango docker-compose.yaml + Docker Hub):
  #   - nango-server  hosted-0.70.6   (matches the @nangohq/node@0.70.6 SDK)
  #   - postgres      16.0-alpine     (Nango's bundled DB version)
  #   - redis         7.2.4           (Nango's bundled cache version)
  # Elasticsearch (NANGO_LOGS_ENABLED) is OFF — logs go to stdout (lean self-host).
  # D5: Nango is COMMERCIAL-ONLY. A gov tenant is code-blocked from ever reaching it
  # (tool-list filter, dispatch refusal, executor hard-check, connect-route 403) — the
  # stack running does NOT widen gov's surface. ─────────────────────────────────────

  # Dedicated Postgres for Nango (separate from cosmos-postgres — Nango owns its own
  # schema/migrations). Internal-only: NO host port. Data on a named volume.
  cosmos-nango-db:
    image: postgres@sha256:d171d14965e28764824b33974d038aea3a6be3bf0ced3c8656c848df9b7218c5 # postgres:16.0-alpine (linux/amd64)
    profiles: ["nango"]
    environment:
      POSTGRES_USER: ${NANGO_DB_USER:-nango}
      POSTGRES_PASSWORD: ${NANGO_DB_PASSWORD:-nango}
      POSTGRES_DB: ${NANGO_DB_NAME:-nango}
    volumes:
      - cosmos-nango-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${NANGO_DB_USER:-nango}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache for Nango. Internal-only: NO host port.
  cosmos-nango-redis:
    image: redis@sha256:9341b6548cc35b64a6de0085555264336e2f570e17ecff20190bf62222f2bd64 # redis:7.2.4 (linux/amd64)
    profiles: ["nango"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # The Nango server: the OAuth/API-key broker + proxy + Connect UI. The app calls it
  # at http://cosmos-nango-server:3003 over the internal network (NANGO_HOST). The
  # server (3003) + Connect UI (3009) are host-published on FREE ports for the grant
  # flow. NANGO_ENCRYPTION_KEY (required for Connect UI sessions) + the dashboard
  # creds come from .env (placeholders in .env.example). FLAG_AUTH_ENABLED is left at
  # the self-host default (no public signup); the dashboard is basic-auth protected.
  cosmos-nango-server:
    image: nangohq/nango-server@sha256:acb67345804907fa77e721ba484277b0075220477262d669add770070e97fc2b # nangohq/nango-server:hosted-0.70.6 (linux/amd64)
    profiles: ["nango"]
    platform: linux/amd64
    environment:
      NANGO_ENCRYPTION_KEY: ${NANGO_ENCRYPTION_KEY:-}
      NANGO_DB_USER: ${NANGO_DB_USER:-nango}
      NANGO_DB_PASSWORD: ${NANGO_DB_PASSWORD:-nango}
      NANGO_DB_HOST: cosmos-nango-db
      NANGO_DB_PORT: "5432"
      NANGO_DB_NAME: ${NANGO_DB_NAME:-nango}
      NANGO_DB_SSL: "false"
      RECORDS_DATABASE_URL: postgresql://${NANGO_DB_USER:-nango}:${NANGO_DB_PASSWORD:-nango}@cosmos-nango-db:5432/${NANGO_DB_NAME:-nango}
      NANGO_REDIS_URL: redis://cosmos-nango-redis:6379
      SERVER_PORT: "3003"
      CSP_REPORT_ONLY: "true"
      # The in-boundary URL the app uses (NANGO_HOST) is the internal name; these two
      # are the externally-reachable URLs the Connect UI / OAuth callbacks use.
      NANGO_SERVER_URL: ${NANGO_SERVER_URL:-http://localhost:3013}
      NANGO_PUBLIC_SERVER_URL: ${NANGO_PUBLIC_SERVER_URL:-http://localhost:3013}
      NANGO_DASHBOARD_USERNAME: ${NANGO_DASHBOARD_USERNAME:-nango}
      NANGO_DASHBOARD_PASSWORD: ${NANGO_DASHBOARD_PASSWORD:-nango}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Elasticsearch OFF — logs to stdout (lean self-host). FLAG_SERVE_CONNECT_UI on
      # so the connect flow is available on the published Connect-UI port.
      NANGO_LOGS_ENABLED: "false"
      FLAG_SERVE_CONNECT_UI: "true"
      NANGO_CONNECT_UI_PORT: "3009"
    ports:
      # host:container — Nango's 3003 (server) → host 3013; 3009 (Connect UI) → host 3019.
      - "3013:3003"
      - "3019:3009"
    depends_on:
      cosmos-nango-db:
        condition: service_healthy
      cosmos-nango-redis:
        condition: service_healthy
    healthcheck:
      # The image ships node; hit the server's /health over loopback inside the container.
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3003/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 10

volumes:
  cosmos-pgdata:
  cosmos-minio-data:
  cosmos-minio-certs:
  cosmos-pgsock:
  cosmos-prometheus-data:
  cosmos-grafana-data:
  # Nango's dedicated Postgres data (nango profile).
  cosmos-nango-pgdata:
  # pgBackRest state dir (stanza ledger + lock state + the .stanza-ready marker). MUST be
  # a named volume so the marker survives container recreate — see the mount comment on
  # cosmos-postgres (FIX: WAL silently dropped post-recreate if this is on the writable layer).
  cosmos-pgbackrest-state:
